<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в панель управления | Формоза-Сервис</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="login-body">
    <!-- Декоративные фоновые элементы -->
    <div class="login-bg-shape shape-1"></div>
    <div class="login-bg-shape shape-2"></div>
    <div class="login-bg-shape shape-3"></div>

    <div class="login-wrap">
        <div class="login-card" id="login-card">
            <div class="login-logo">
                <img src="../assets/images/logo.png" alt="Формоза-Сервис">
            </div>
            <h1>Панель управления</h1>
            <p>Введите логин и пароль для входа</p>

            <form id="login-form" class="login-form" novalidate>
                <div class="form-group">
                    <label for="username">Логин</label>
                    <div class="input-wrap">
                        <div class="input-icon-wrap">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                        </div>
                        <input type="text" id="username" name="username" placeholder="Введите логин" required autofocus autocomplete="username">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <div class="input-wrap">
                        <div class="input-icon-wrap">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                        </div>
                        <input type="password" id="password" name="password" placeholder="Введите пароль" required autocomplete="current-password">
                        <button type="button" class="toggle-password" id="toggle-password" aria-label="Показать пароль">
                            <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            <svg id="eye-off-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-login" id="login-btn">
                    <span class="btn-text">Войти</span>
                    <span class="btn-spinner" style="display:none">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="12" cy="12" r="10" stroke-dasharray="60" stroke-dashoffset="20" stroke-linecap="round"/></svg>
                    </span>
                </button>

                <div id="login-error" class="login-error" role="alert"></div>
            </form>

            <div class="login-footer">
                <span>Формоза-Сервис &copy; 2026</span>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const form = document.getElementById('login-form');
        const btn = document.getElementById('login-btn');
        const btnText = btn.querySelector('.btn-text');
        const btnSpinner = btn.querySelector('.btn-spinner');
        const errorEl = document.getElementById('login-error');
        const card = document.getElementById('login-card');
        const togglePass = document.getElementById('toggle-password');
        const passInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eye-icon');
        const eyeOffIcon = document.getElementById('eye-off-icon');

        // Показ/скрытие пароля
        togglePass.addEventListener('click', () => {
            const isHidden = passInput.type === 'password';
            passInput.type = isHidden ? 'text' : 'password';
            eyeIcon.style.display = isHidden ? 'none' : 'block';
            eyeOffIcon.style.display = isHidden ? 'block' : 'none';
            togglePass.setAttribute('aria-label', isHidden ? 'Скрыть пароль' : 'Показать пароль');
        });

        // Валидация в реальном времени — убираем ошибку при вводе
        form.addEventListener('input', () => {
            if (errorEl.textContent) {
                errorEl.textContent = '';
                card.classList.remove('shake');
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.textContent = '';
            card.classList.remove('shake');

            const username = document.getElementById('username').value.trim();
            const password = passInput.value;

            if (!username || !password) {
                showError('Введите логин и пароль');
                return;
            }

            // Loading state
            btn.disabled = true;
            btnText.style.display = 'none';
            btnSpinner.style.display = 'block';

            try {
                const res = await fetch(API_BASE + '/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('admin_token', data.token);
                    localStorage.setItem('admin_user', JSON.stringify(data.user));
                    // Плавное исчезновение перед редиректом
                    card.style.transform = 'translateY(-8px) scale(0.98)';
                    card.style.opacity = '0.6';
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 250);
                } else {
                    showError(data.error || 'Неверный логин или пароль');
                }
            } catch {
                showError('Не удалось подключиться к серверу');
            } finally {
                btn.disabled = false;
                btnText.style.display = 'block';
                btnSpinner.style.display = 'none';
            }
        });

        function showError(msg) {
            errorEl.textContent = msg;
            card.classList.add('shake');
            setTimeout(() => card.classList.remove('shake'), 500);
        }
    </script>
</body>
</html>
