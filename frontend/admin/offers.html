<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Акции | Панель управления</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar" id="sidebar"></aside>
        <div class="main">
            <header class="topbar">
                <button class="sidebar-toggle" onclick="toggleSidebar()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <h1 class="topbar-title">Акции и предложения</h1>
                <div class="topbar-actions">
                    <button class="btn btn-primary btn-sm" onclick="openModal('offer-modal')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        Добавить
                    </button>
                </div>
            </header>
            <main class="content">
                <div class="card">
                    <div class="card-body">
                        <div class="table-wrap">
                            <table class="data-table" id="offers-table">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Заголовок</th>
                                        <th>Описание</th>
                                        <th>Цена</th>
                                        <th>Дата</th>
                                        <th>Действия</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                        <div class="empty-state" id="offers-empty" style="display:none;">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
                            <p>Акций не найдено</p>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Add/Edit Offer Modal -->
    <div class="modal-overlay" id="offer-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="offer-modal-title">Новое предложение</h3>
                <button class="modal-close" onclick="closeModal('offer-modal')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Заголовок</label>
                    <input type="text" id="o-title" placeholder="Название акции" required>
                </div>
                <div class="form-group">
                    <label>Описание</label>
                    <textarea id="o-desc" rows="3" placeholder="Описание предложения..." required></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Старая цена</label>
                        <input type="text" id="o-old" placeholder="от 50 000 ₽">
                    </div>
                    <div class="form-group">
                        <label>Новая цена</label>
                        <input type="text" id="o-new" placeholder="от 42 500 ₽">
                    </div>
                </div>
                <div class="form-group">
                    <label>Особенности (через запятую)</label>
                    <input type="text" id="o-features" placeholder="0% первый взнос, до 12 мес, без переплат">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('offer-modal')">Отмена</button>
                <button class="btn btn-primary" onclick="saveOffer()">Сохранить</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/admin.js"></script>
    <script>
        if (!checkAuth()) throw new Error('Unauthorized');
        if (!isManager()) { window.location.href = 'index.html'; }
        renderSidebar('offers');

        let editingOfferId = null;

        async function loadOffers() {
            try {
                const offers = await apiClient.get('/api/offers');
                const tbody = document.querySelector('#offers-table tbody');

                if (offers.length === 0) {
                    document.getElementById('offers-empty').style.display = 'block';
                    document.getElementById('offers-table').style.display = 'none';
                    return;
                }

                document.getElementById('offers-empty').style.display = 'none';
                document.getElementById('offers-table').style.display = 'table';

                tbody.innerHTML = offers.map(o => `
                    <tr>
                        <td>${o.id}</td>
                        <td><strong>${o.title}</strong></td>
                        <td>${o.description.substring(0, 60)}${o.description.length > 60 ? '...' : ''}</td>
                        <td>${o.price_new ? `<span style="color:#28A745;font-weight:700;">${o.price_new}</span>` : '-'} ${o.price_old ? `<span style="text-decoration:line-through;color:#ADB5BD;font-size:12px;">${o.price_old}</span>` : ''}</td>
                        <td>${formatDate(o.created_at)}</td>
                        <td>
                            <button class="btn btn-sm btn-secondary" onclick="editOffer(${o.id}, '${o.title.replace(/'/g, "\\'")}', '${o.description.replace(/'/g, "\\'")}', '${o.price_old || ''}', '${o.price_new || ''}', '${(o.features || '').replace(/'/g, "\\'")}')">Изменить</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteOffer(${o.id})">Удалить</button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                showToast(e.message, 'error');
            }
        }

        function editOffer(id, title, desc, oldPrice, newPrice, features) {
            editingOfferId = id;
            document.getElementById('offer-modal-title').textContent = 'Редактировать предложение';
            document.getElementById('o-title').value = title;
            document.getElementById('o-desc').value = desc;
            document.getElementById('o-old').value = oldPrice;
            document.getElementById('o-new').value = newPrice;
            document.getElementById('o-features').value = features;
            openModal('offer-modal');
        }

        async function saveOffer() {
            const featuresStr = document.getElementById('o-features').value.trim();
            const features = featuresStr ? featuresStr.split(',').map(f => f.trim()).filter(Boolean) : [];

            const data = {
                title: document.getElementById('o-title').value.trim(),
                description: document.getElementById('o-desc').value.trim(),
                price_old: document.getElementById('o-old').value.trim(),
                price_new: document.getElementById('o-new').value.trim(),
                features
            };

            if (!data.title || !data.description) {
                showToast('Заполните обязательные поля', 'error');
                return;
            }

            try {
                if (editingOfferId) {
                    await apiClient.patch(`/api/offers/${editingOfferId}`, data);
                    showToast('Предложение обновлено');
                } else {
                    await apiClient.post('/api/offers', data);
                    showToast('Предложение создано');
                }
                closeModal('offer-modal');
                editingOfferId = null;
                clearForm();
                loadOffers();
            } catch (e) {
                showToast(e.message, 'error');
            }
        }

        async function deleteOffer(id) {
            if (!confirm('Удалить предложение #' + id + '?')) return;
            try {
                await apiClient.delete(`/api/offers/${id}`);
                showToast('Предложение удалено');
                loadOffers();
            } catch (e) {
                showToast(e.message, 'error');
            }
        }

        function clearForm() {
            document.getElementById('offer-modal-title').textContent = 'Новое предложение';
            document.getElementById('o-title').value = '';
            document.getElementById('o-desc').value = '';
            document.getElementById('o-old').value = '';
            document.getElementById('o-new').value = '';
            document.getElementById('o-features').value = '';
        }

        loadOffers();
    </script>
</body>
</html>
