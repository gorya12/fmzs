<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пользователи | Панель управления</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar" id="sidebar"></aside>
        <div class="main">
            <header class="topbar">
                <button class="sidebar-toggle" onclick="toggleSidebar()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <h1 class="topbar-title">Пользователи</h1>
                <div class="topbar-actions">
                    <button class="btn btn-primary btn-sm" onclick="openModal('user-modal')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        Добавить
                    </button>
                </div>
            </header>
            <main class="content">
                <div class="card">
                    <div class="card-body">
                        <div class="table-wrap">
                            <table class="data-table" id="users-table">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Логин</th>
                                        <th>ФИО</th>
                                        <th>Роль</th>
                                        <th>Создан</th>
                                        <th>Последний вход</th>
                                        <th>Действия</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                        <div class="empty-state" id="users-empty" style="display:none;">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                            <p>Пользователей не найдено</p>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Add User Modal -->
    <div class="modal-overlay" id="user-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Новый пользователь</h3>
                <button class="modal-close" onclick="closeModal('user-modal')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Логин</label>
                    <input type="text" id="u-username" placeholder="ivanov" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="text" id="u-password" placeholder="Минимум 6 символов" required>
                </div>
                <div class="form-group">
                    <label>ФИО</label>
                    <input type="text" id="u-fullname" placeholder="Иванов Иван Иванович" required>
                </div>
                <div class="form-group">
                    <label>Роль</label>
                    <select id="u-role" required>
                        <option value="">Выберите роль</option>
                        <option value="manager">Менеджер (новости, акции)</option>
                        <option value="support">Поддержка (заявки)</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('user-modal')">Отмена</button>
                <button class="btn btn-primary" onclick="createUser()">Создать</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/admin.js"></script>
    <script>
        if (!checkAuth()) throw new Error('Unauthorized');
        if (!isSuperadmin()) { window.location.href = 'index.html'; }
        renderSidebar('users');

        async function loadUsers() {
            try {
                const users = await apiClient.get('/api/users');
                const tbody = document.querySelector('#users-table tbody');

                if (users.length === 0) {
                    document.getElementById('users-empty').style.display = 'block';
                    document.getElementById('users-table').style.display = 'none';
                    return;
                }

                document.getElementById('users-empty').style.display = 'none';
                document.getElementById('users-table').style.display = 'table';

                tbody.innerHTML = users.map(u => {
                    const roleClass = 'badge-' + u.role;
                    return `<tr>
                        <td>${u.id}</td>
                        <td><strong>${u.username}</strong></td>
                        <td>${u.full_name}</td>
                        <td><span class="badge ${roleClass}">${formatRole(u.role)}</span></td>
                        <td>${formatDate(u.created_at)}</td>
                        <td>${u.last_login ? formatDate(u.last_login) : 'Никогда'}</td>
                        <td>
                            ${u.role !== 'superadmin' ? `<button class="btn btn-sm btn-danger" onclick="deleteUser(${u.id})">Удалить</button>` : '<span style="color:var(--gray-400);">—</span>'}
                        </td>
                    </tr>`;
                }).join('');
            } catch (e) {
                showToast(e.message, 'error');
            }
        }

        async function createUser() {
            const data = {
                username: document.getElementById('u-username').value.trim(),
                password: document.getElementById('u-password').value,
                full_name: document.getElementById('u-fullname').value.trim(),
                role: document.getElementById('u-role').value
            };

            if (!data.username || !data.password || !data.full_name || !data.role) {
                showToast('Заполните все поля', 'error');
                return;
            }

            try {
                await apiClient.post('/api/users', data);
                closeModal('user-modal');
                showToast('Пользователь создан');
                document.getElementById('u-username').value = '';
                document.getElementById('u-password').value = '';
                document.getElementById('u-fullname').value = '';
                document.getElementById('u-role').value = '';
                loadUsers();
            } catch (e) {
                showToast(e.message, 'error');
            }
        }

        async function deleteUser(id) {
            if (!confirm('Удалить пользователя #' + id + '?')) return;
            try {
                await apiClient.delete(`/api/users/${id}`);
                showToast('Пользователь удалён');
                loadUsers();
            } catch (e) {
                showToast(e.message, 'error');
            }
        }

        loadUsers();
    </script>
</body>
</html>
