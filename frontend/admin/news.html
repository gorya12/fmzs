<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Новости | Панель управления</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar" id="sidebar"></aside>
        <div class="main">
            <header class="topbar">
                <button class="sidebar-toggle" onclick="toggleSidebar()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <h1 class="topbar-title">Новости</h1>
                <div class="topbar-actions">
                    <button class="btn btn-primary btn-sm" onclick="openModal('news-modal')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        Добавить
                    </button>
                </div>
            </header>
            <main class="content">
                <div class="card">
                    <div class="card-body">
                        <div class="table-wrap">
                            <table class="data-table" id="news-table">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Заголовок</th>
                                        <th>Категория</th>
                                        <th>Дата</th>
                                        <th>Статус</th>
                                        <th>Действия</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                        <div class="empty-state" id="news-empty" style="display:none;">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                            <p>Новостей не найдено</p>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Add/Edit News Modal -->
    <div class="modal-overlay" id="news-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="news-modal-title">Новая новость</h3>
                <button class="modal-close" onclick="closeModal('news-modal')">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                </button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="n-id">
                <div class="form-row">
                    <div class="form-group">
                        <label>Заголовок</label>
                        <input type="text" id="n-title" placeholder="Заголовок новости" required>
                    </div>
                    <div class="form-group">
                        <label>Категория</label>
                        <select id="n-category" required>
                            <option value="news">Новости</option>
                            <option value="updates">Обновления</option>
                            <option value="events">События</option>
                            <option value="other">Другое</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Краткое описание</label>
                    <input type="text" id="n-excerpt" placeholder="2-3 предложения..." required>
                </div>
                <div class="form-group">
                    <label>Полный текст</label>
                    <textarea id="n-content" rows="5" placeholder="Полный текст новости..."></textarea>
                </div>
                <div class="form-group">
                    <label>URL изображения</label>
                    <input type="text" id="n-image" placeholder="https://...">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('news-modal')">Отмена</button>
                <button class="btn btn-primary" onclick="saveNews()">Сохранить</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/admin.js"></script>
    <script>
        if (!checkAuth()) throw new Error('Unauthorized');
        if (!isManager()) { window.location.href = 'index.html'; }
        renderSidebar('news');

        let editingNewsId = null;

        async function loadNews() {
            try {
                const news = await apiClient.get('/api/news');
                const tbody = document.querySelector('#news-table tbody');

                if (news.length === 0) {
                    document.getElementById('news-empty').style.display = 'block';
                    document.getElementById('news-table').style.display = 'none';
                    return;
                }

                document.getElementById('news-empty').style.display = 'none';
                document.getElementById('news-table').style.display = 'table';

                tbody.innerHTML = news.map(n => `
                    <tr>
                        <td>${n.id}</td>
                        <td><strong>${n.title}</strong></td>
                        <td>${n.category}</td>
                        <td>${formatDate(n.created_at)}</td>
                        <td>${n.is_active ? '<span class="badge badge-completed">Активна</span>' : '<span class="badge badge-closed">Скрыта</span>'}</td>
                        <td>
                            <button class="btn btn-sm btn-secondary" onclick="editNews(${n.id}, '${n.title.replace(/'/g, "\\'")}', '${n.category}', '${n.excerpt.replace(/'/g, "\\'")}', '${(n.content || '').replace(/'/g, "\\'")}', '${n.image_url || ''}')">Изменить</button>
                            <button class="btn btn-sm btn-danger" onclick="deleteNews(${n.id})">Удалить</button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                showToast(e.message, 'error');
            }
        }

        function editNews(id, title, category, excerpt, content, image) {
            editingNewsId = id;
            document.getElementById('news-modal-title').textContent = 'Редактировать новость';
            document.getElementById('n-title').value = title;
            document.getElementById('n-category').value = category;
            document.getElementById('n-excerpt').value = excerpt;
            document.getElementById('n-content').value = content;
            document.getElementById('n-image').value = image;
            openModal('news-modal');
        }

        async function saveNews() {
            const excerpt = document.getElementById('n-excerpt').value.trim();
            const content = document.getElementById('n-content').value.trim() || excerpt;
            const data = {
                title: document.getElementById('n-title').value.trim(),
                category: document.getElementById('n-category').value.trim(),
                excerpt,
                content,
                image_url: document.getElementById('n-image').value.trim()
            };

            if (!data.title || !data.category || !data.excerpt || !data.content) {
                showToast('Заполните обязательные поля', 'error');
                return;
            }

            if (data.title.length < 5) {
                showToast('Заголовок должен быть минимум 5 символов', 'error');
                return;
            }

            if (data.excerpt.length < 10) {
                showToast('Краткое описание должно быть минимум 10 символов', 'error');
                return;
            }

            if (data.content.length < 20) {
                showToast('Полный текст должен быть минимум 20 символов', 'error');
                return;
            }

            try {
                if (editingNewsId) {
                    await apiClient.patch(`/api/news/${editingNewsId}`, data);
                    showToast('Новость обновлена');
                } else {
                    await apiClient.post('/api/news', data);
                    showToast('Новость создана');
                }
                closeModal('news-modal');
                editingNewsId = null;
                clearForm();
                loadNews();
            } catch (e) {
                showToast(e.message, 'error');
            }
        }

        async function deleteNews(id) {
            if (!confirm('Удалить новость #' + id + '?')) return;
            try {
                await apiClient.delete(`/api/news/${id}`);
                showToast('Новость удалена');
                loadNews();
            } catch (e) {
                showToast(e.message, 'error');
            }
        }

        function clearForm() {
            document.getElementById('news-modal-title').textContent = 'Новая новость';
            document.getElementById('n-title').value = '';
            document.getElementById('n-category').value = '';
            document.getElementById('n-excerpt').value = '';
            document.getElementById('n-content').value = '';
            document.getElementById('n-image').value = '';
        }

        loadNews();
    </script>
</body>
</html>
