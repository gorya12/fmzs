services:
  api:
    build:
      context: .
      dockerfile: frontend/admin/server/Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
      ADMIN_DB_PATH: /data/admin.db
    volumes:
      - formosa_data:/data
      - formosa_uploads:/app/frontend/admin/server/uploads
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - formosa_uploads:/usr/share/nginx/html/uploads:ro
    restart: unless-stopped

volumes:
  formosa_data:
  formosa_uploads:
