services:
  api:
    build:
      context: .
      dockerfile: frontend/admin/server/Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3001
      ADMIN_DB_PATH: /data/admin.db
    volumes:
      - formosa_data:/data
      - formosa_uploads:/app/frontend/admin/server/uploads
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend:/usr/share/caddy:ro
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  formosa_data:
  formosa_uploads:
  caddy_data:
  caddy_config:
